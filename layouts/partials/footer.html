<script>
  document.addEventListener("DOMContentLoaded", function () {
    const tables = document.querySelectorAll(".content table, article table");

    window.addEventListener("scroll", function () {
      tables.forEach((table) => {
        const rect = table.getBoundingClientRect();
        const windowHeight = window.innerHeight;
        const middleOfScreen = windowHeight / 2;

        // Hitung kapasitas maksimum scroll horizontal tabel
        const maxScrollLeft = table.scrollWidth - table.clientWidth;

        // Jika tabel tidak butuh scroll (ukuran konten muat di layar), lewati
        if (maxScrollLeft <= 0) return;

        // 1. Belum sampai tengah layar: Kunci di posisi paling awal (kiri)
        if (rect.top > middleOfScreen) {
          table.scrollLeft = 0;
          return;
        }

        // 2. Berada di rentang area animasi (dari tengah layar ke atas)
        // Menentukan seberapa cepat tabel bergeser (sensitivitas scroll)
        const scrollSensitivity = 1.5; // Ubah angka ini jika ingin gerakannya lebih cepat/lambat
        const distanceAfterMiddle = middleOfScreen - rect.top;
        
        // Hitung posisi geser dalam pixel
        let targetScrollLeft = distanceAfterMiddle * scrollSensitivity;

        // 3. Kunci di ujung akhir jika sudah mentok kanan
        if (targetScrollLeft >= maxScrollLeft) {
          table.scrollLeft = maxScrollLeft; // TERKUNCI di akhir tabel
        } else {
          table.scrollLeft = targetScrollLeft; // Bergeser secara mulus
        }
      });
    });
  });
</script>
