<script>
  document.addEventListener("DOMContentLoaded", function () {
    const tables = document.querySelectorAll(".content table, article table");

    window.addEventListener("scroll", function () {
      tables.forEach((table) => {
        const rect = table.getBoundingClientRect();
        const windowHeight = window.innerHeight;
        const middleOfScreen = windowHeight / 2;

        // Cek jika bagian atas tabel SUDAH melewatin/mencapai tengah layar
        if (rect.top <= middleOfScreen) {
          // Hitung jarak scroll mulai dari TENGAH layar sampai tabel naik ke atas
          const startPoint = middleOfScreen;
          const distanceScrolled = startPoint - rect.top;
          const totalDistance = rect.height + middleOfScreen;

          // Hitung persentase (0% di tengah layar, naik ke 100% saat di-scroll ke atas)
          let scrollPercent = distanceScrolled / totalDistance;
          scrollPercent = Math.min(1, Math.max(0, scrollPercent)); // Batasi 0.0 sampai 1.0

          // Geser tabel berdasarkan persentase
          const maxScrollLeft = table.scrollWidth - table.clientWidth;
          table.scrollLeft = scrollPercent * maxScrollLeft;
        } else {
          // Jika tabel masih di bawah tengah layar, kunci posisi di paling kiri
          table.scrollLeft = 0;
        }
      });
    });
  });
</script>
