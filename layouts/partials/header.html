<div class="navbar-wrapper">
    <header class="navbar">
        <div class="nav-left">
            <p>©{{ now.Format "2006" }} {{ .Site.Title }}<br>by Multimedia Team</p>
        </div>
        
        <div class="nav-center">
            <a href="{{ .Site.BaseURL }}" class="brand-logo">{{ .Site.Title }}</a>
        </div>
        
        <nav class="nav-right">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL | relURL }}">{{ .Name }}</a>
            {{ end }}
        </nav>

        <button class="menu-toggle" id="mobile-menu-btn">
            <span></span>
            <span></span>
        </button>
    </header>
</div>

<div class="mobile-nav" id="mobile-nav-overlay">
    {{ range .Site.Menus.main }}
    <a href="{{ .URL | relURL }}">{{ .Name }}</a>
    {{ end }}
</div>
