{{ $src := .Get "src" | default (.Get 0) }}
{{ $size := .Get "size" | default "normal" }}
{{ $alt := .Get "alt" | default "Foto Galeri" }}
{{ $caption := .Get "caption" | default (.Get "alt") }}

<div class="bento-item bento-{{ $size }}">
  <img 
    src="{{ $src }}" 
    alt="{{ $alt }}" 
    loading="lazy" 
    decoding="async"
  />
  {{ if $caption }}
    <span class="bento-caption">{{ $caption }}</span>
  {{ end }}
</div>
